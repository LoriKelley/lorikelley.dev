<html>
  <body>
<form id="developer-contact-form" novalidate>
    <!-- Basic Core Configuration Tokens -->
    <input type="hidden" name="access_key" value="38736f3d-a04b-4eaa-9667-4f4d2f977b83" />
    <input type="hidden" name="redirect" value="https://lorikelley.dev" />
    <input type="hidden" name="subject" value="New Client Contact Inquiry via lorikelley.dev" />

    <div class="form-group">
        <label for="client-name">Name<span>*</span></label>
        <input type="text" id="client-name" name="Name" class="form-input" />
        <span class="error-warning-label" id="err-client-name">This field is required</span>
    </div>

    <div class="form-group">
        <label for="client-company">Company Name</label>
        <input type="text" id="client-company" name="Company Name" class="form-input" />
    </div>

    <div class="form-group">
        <label for="client-url">Website URL</label>
        <input type="url" id="client-url" name="Website URL" class="form-input" placeholder="https://" />
    </div>

    <div class="form-group">
        <label for="client-email">Email Address<span>*</span></label>
        <input type="email" id="client-email" name="Email Address" class="form-input" />
        <span class="error-warning-label" id="err-client-email">This field is required</span>
    </div>

    <div class="form-group">
        <label for="client-phone">Phone Number</label>
        <input type="tel" id="client-phone" name="Phone Number" class="form-input" />
    </div>

    <div class="form-group">
        <label for="client-category">Project Category<span>*</span></label>
        <select id="client-category" name="Project Category" class="form-select">
            <option value="" disabled selected>Select a category...</option>
            <option value="Full-Stack, long-term website project (more than 30 days)">Full-Stack, long-term website project (more than 30 days)</option>
            <option value="Full-Stack, short term website project">Full-Stack, short term website project</option>
            <option value="Help with a few design (frontend) bugs on my website">Help with a few design (frontend) bugs on my website</option>
            <option value="Help with a few backend bugs on my website">Help with a few backend bugs on my website</option>
            <option value="Help me figure out an error on my wordpress site">Help me figure out an error on my wordpress site</option>
            <option value="Write a custom script, template, theme, or plugin for a CMS (Wordpress, Drupal, etc) to fit my website">Write a custom script, template, theme, or plugin for a CMS (Wordpress, Drupal, etc) to fit my website</option>
        </select>
        <span class="error-warning-label" id="err-client-category">This field is required</span>
    </div>

    <div class="form-group">
        <label>Best time to contact you: Between...</label>
        <div class="time-select-row">
            <select id="time-start" name="Preferred Start Time" class="form-select">
                <option value="" selected>Select start time...</option>
                <option value="8 AM">8 AM</option>
                <option value="9 AM">9 AM</option>
                <option value="10 AM">10 AM</option>
                <option value="11 AM">11 AM</option>
                <option value="12 PM">12 PM</option>
                <option value="1 PM">1 PM</option>
                <option value="2 PM">2 PM</option>
                <option value="3 PM">3 PM</option>
                <option value="4 PM">4 PM</option>
                <option value="5 PM">5 PM</option>
                <option value="6 PM">6 PM</option>
                <option value="7 PM">7 PM</option>
                <option value="8 PM">8 PM</option>
            </select>
            <span class="time-split-word">and</span>
            <select id="time-end" name="Preferred End Time" class="form-select">
                <option value="" selected>Select end time...</option>
                <option value="9 AM">9 AM</option>
                <option value="10 AM">10 AM</option>
                <option value="11 AM">11 AM</option>
                <option value="12 PM">12 PM</option>
                <option value="1 PM">1 PM</option>
                <option value="2 PM">2 PM</option>
                <option value="3 PM">3 PM</option>
                <option value="4 PM">4 PM</option>
                <option value="5 PM">5 PM</option>
                <option value="6 PM">6 PM</option>
                <option value="7 PM">7 PM</option>
                <option value="8 PM">8 PM</option>
                <option value="9 PM">9 PM</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="client-summary">Describe a small summary of your project and questions:<span>*</span></label>
        <textarea id="client-summary" name="Project Summary Details" class="form-textarea" maxlength="1000"></textarea>
        <span class="error-warning-label" id="err-client-summary">This field is required</span>
        <span class="error-warning-label" id="err-client-summary-min">You haven't reached the minimum amount of characters- please describe your reason for contacting</span>
    </div>

    <button type="submit" class="submit-form-btn">Submit Request</button>
</form>
</body>

<script>
		const contactForm = document.getElementById('developer-contact-form');
	contactForm?.addEventListener('submit', (e) => {
		e.preventDefault(); // This explicitly blocks Cloudflare from throwing that 405 error!

		const errors = document.querySelectorAll('.error-warning-label');
		errors.forEach(err => err.style.display = 'none');
		const inputs = document.querySelectorAll('.form-input, .form-select, .form-textarea');
		inputs.forEach(inp => inp.classList.remove('input-error-border'));

		let formIsValid = true;

		const nameInput = document.getElementById('client-name');
		const emailInput = document.getElementById('client-email');
		const categorySelect = document.getElementById('client-category');
		const summaryTextArea = document.getElementById('client-summary');
		const minErrorLabel = document.getElementById('err-client-summary-min');

		if (!nameInput || !nameInput.value.trim()) {
			const err = document.getElementById('err-client-name');
			if (err) err.style.display = 'block';
			nameInput?.classList.add('input-error-border');
			formIsValid = false;
		}
		if (!emailInput || !emailInput.value.trim()) {
			const err = document.getElementById('err-client-email');
			if (err) err.style.display = 'block';
			emailInput?.classList.add('input-error-border');
			formIsValid = false;
		}
		if (!categorySelect || !categorySelect.value) {
			const err = document.getElementById('err-client-category');
			if (err) err.style.display = 'block';
			categorySelect?.classList.add('input-error-border');
			formIsValid = false;
		}
		if (!summaryTextArea || !summaryTextArea.value.trim()) {
			const err = document.getElementById('err-client-summary');
			if (err) err.style.display = 'block';
			summaryTextArea?.classList.add('input-error-border');
			formIsValid = false;
		}

		if (summaryTextArea && summaryTextArea.value.trim().length > 0 && summaryTextArea.value.trim().length < 30) {
			if (minErrorLabel) minErrorLabel.style.display = 'block';
			summaryTextArea.classList.add('input-error-border');
			formIsValid = false;
		}

		if (!formIsValid) return;

		// Read form field text safely
		const name = nameInput.value;
		const company = document.getElementById('client-company').value || "Not Provided";
		const url = document.getElementById('client-url').value || "Not Provided";
		const email = emailInput.value;
		const phone = document.getElementById('client-phone').value || "Not Provided";
		const category = categorySelect.value;
		
		const timeStart = document.getElementById('time-start').value;
		const timeEnd = document.getElementById('time-end').value;
		const bestTimeToContact = (timeStart && timeEnd) ? `Between ${timeStart} and ${timeEnd}` : "Not Provided";
		const projectSummary = summaryTextArea.value.trim();

		// Compile values into a clean, formatted report string for your email body
		const formattedMessage = 
			`New Client Contact Form Submission:\n\n` +
			`Name: ${name}\n` +
			`Company: ${company}\n` +
			`Website URL: ${url}\n` +
			`Email: ${email}\n` +
			`Phone: ${phone}\n` +
			`Project Category: ${category}\n` +
			`Best Time To Contact: ${bestTimeToContact}\n\n` +
			`Project Summary & Questions:\n${projectSummary}`;

		// Send data silently using standard JSON formatting to clear network locks
		fetch("https://web3forms.com", {
			method: "POST",
			headers: {
				"Content-Type": "application/json",
				"Accept": "application/json"
			},
			body: JSON.stringify({
				access_key: "38736f3d-a04b-4eaa-9667-4f4d2f977b83",
				subject: `Contact Inquiry from ${name} via lorikelley.dev`,
				from_name: "noreply@lorikelley.dev",
				message: formattedMessage
			})
		})
		.then(response => response.json())
		.then(data => {
			if (data.success) {
				alert("Thank you! Your request has been sent successfully.");
				if (overlayElement) overlayElement.classList.remove('open');
				contactForm.reset();
			} else {
				alert("Web3Forms API Error: " + data.message);
			}
		})
		.catch(error => {
			console.error("Transmission Error:", error);
			alert("Form transmission could not complete. Please check your internet connection.");
		});
	});

</script>
</html>
